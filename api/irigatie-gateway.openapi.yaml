openapi: 3.0.3
info:
  title: Irigatie HTTP Gateway API
  version: 1.0.0
  description: |
    HTTP API exposed by `irigatie-http-gateway.py`.

    The gateway authenticates requests, validates JSON bodies, and forwards
    accepted commands to the local irrigation daemon Unix socket. The daemon
    owns GPIO control; API clients must not talk to GPIO, MySQL, systemd, or
    the Unix socket directly.
servers:
  - url: http://raspberry-pi-host-or-ip:8080
    description: Raspberry Pi HTTP gateway
security:
  - bearerAuth: []
  - irigatieToken: []
tags:
  - name: Status
  - name: Commands
  - name: App
paths:
  /status:
    get:
      tags:
        - Status
      summary: Read gateway and daemon status
      operationId: getStatus
      responses:
        "200":
          description: Gateway and daemon status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Gateway is running but the daemon status could not be read.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusUnavailableResponse"
  /api/snapshot:
    get:
      tags:
        - App
      summary: Read app snapshot
      description: |
        Returns the app read model assembled from the database plus best-effort
        daemon status. If the daemon status socket is unavailable, database
        data can still be returned with `gateway.online: false`.
      operationId: getAppSnapshot
      responses:
        "200":
          description: Snapshot for app/mobile clients. Can be degraded when database reads fail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSnapshotResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/watering-history:
    get:
      tags:
        - App
      summary: Read watering history
      description: Returns recent watering attempts from the append-only `watering_log` table.
      operationId: getWateringHistory
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: before_id
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Cursor. Return rows with `watering_log.id < before_id`.
        - name: since_hours
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Return rows with `started_at >= NOW() - INTERVAL since_hours HOUR`.
        - name: result
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 64
          description: Exact raw result-code filter.
        - name: source
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 64
          description: Exact raw source filter.
        - name: zone_id
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Filter by `watering_log.traseu_id`.
        - name: program_id
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Filter by `watering_log.program_id`.
      responses:
        "200":
          description: Paginated watering history.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WateringHistoryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ReadFailed"
  /api/zones/{zone_id}:
    parameters:
      - $ref: "#/components/parameters/ZoneIdPath"
    patch:
      tags:
        - App
      summary: Update a zone
      operationId: updateZone
      requestBody:
        $ref: "#/components/requestBodies/ZonePatchBody"
      responses:
        "200":
          $ref: "#/components/responses/WriteUpdated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/BodyTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          $ref: "#/components/responses/WriteFailed"
  /api/zones/{zone_id}/enabled:
    parameters:
      - $ref: "#/components/parameters/ZoneIdPath"
    post:
      tags:
        - App
      summary: Toggle zone enabled state
      operationId: setZoneEnabled
      requestBody:
        $ref: "#/components/requestBodies/ZoneEnabledBody"
      responses:
        "200":
          $ref: "#/components/responses/WriteUpdated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/BodyTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          $ref: "#/components/responses/WriteFailed"
  /commands/start:
    post:
      tags:
        - Commands
      summary: Queue a scheduled watering program
      description: |
        Sends `START <program_id>` to the daemon. The HTTP gateway only confirms
        that the command was forwarded to the socket.
      operationId: startProgram
      requestBody:
        $ref: "#/components/requestBodies/ProgramIdBody"
      responses:
        "202":
          description: Command accepted by the gateway and forwarded to the socket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAcceptedResponse"
              example:
                accepted: true
                command: START 12
                ok: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/BodyTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "503":
          $ref: "#/components/responses/DaemonCommandUnavailable"
  /commands/test:
    post:
      tags:
        - Commands
      summary: Queue a zone relay test
      description: |
        Sends `TEST <zone_id>` to the daemon. The daemon runs the selected zone
        for its configured short test duration.
      operationId: testCommands
      requestBody:
        $ref: "#/components/requestBodies/ZoneIdBody"
      responses:
        "202":
          description: Command accepted by the gateway and forwarded to the socket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAcceptedResponse"
              example:
                ok: true
                accepted: true
                command: TEST 4
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/BodyTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "503":
          $ref: "#/components/responses/DaemonCommandUnavailable"
  /api/schedules:
    post:
      tags:
        - App
      summary: Create a schedule
      description: Creates a `programari` row and asks the daemon to reload generated timers.
      operationId: createSchedule
      requestBody:
        $ref: "#/components/requestBodies/ScheduleWriteBody"
      responses:
        "201":
          $ref: "#/components/responses/WriteCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/BodyTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          $ref: "#/components/responses/WriteFailed"
  /api/schedules/{schedule_id}:
    parameters:
      - $ref: "#/components/parameters/ScheduleIdPath"
    patch:
      tags:
        - App
      summary: Update a schedule
      description: Updates a `programari` row and asks the daemon to reload generated timers.
      operationId: updateSchedule
      requestBody:
        $ref: "#/components/requestBodies/SchedulePatchBody"
      responses:
        "200":
          $ref: "#/components/responses/WriteUpdated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/BodyTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          $ref: "#/components/responses/WriteFailed"
    delete:
      tags:
        - App
      summary: Delete a schedule
      description: Deletes a `programari` row and asks the daemon to reload generated timers.
      operationId: deleteSchedule
      responses:
        "200":
          $ref: "#/components/responses/WriteDeleted"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/WriteFailed"
  /api/schedules/{schedule_id}/execute:
    parameters:
      - $ref: "#/components/parameters/ScheduleIdPath"
    post:
      tags:
        - App
      summary: Queue a schedule to run now
      description: Sends `START <schedule_id>` to the daemon.
      operationId: executeSchedule
      responses:
        "202":
          description: Command accepted by the gateway and forwarded to the socket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAcceptedResponse"
              example:
                accepted: true
                command: START 12
                ok: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/DaemonCommandUnavailable"
  /api/schedules/start:
    post:
      tags:
        - App
      summary: Queue a scheduled watering program
      description: |
        App-facing alias for `/commands/start`. Sends `START <program_id>` to
        the daemon and only confirms that the command was forwarded.
      operationId: appStartSchedule
      requestBody:
        $ref: "#/components/requestBodies/ProgramIdBody"
      responses:
        "202":
          description: Command accepted by the gateway and forwarded to the socket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAcceptedResponse"
              example:
                accepted: true
                command: START 12
                ok: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/BodyTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "503":
          $ref: "#/components/responses/DaemonCommandUnavailable"
  /commands/exec:
    post:
      tags:
        - Commands
      summary: Queue a manual watering program
      description: |
        Sends `EXEC <program_id>` to the daemon. The HTTP gateway only confirms
        that the command was forwarded to the socket.
      operationId: executeManualProgram
      requestBody:
        $ref: "#/components/requestBodies/ProgramIdBody"
      responses:
        "202":
          description: Command accepted by the gateway and forwarded to the socket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAcceptedResponse"
              example:
                accepted: true
                command: EXEC 3
                ok: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/BodyTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "503":
          $ref: "#/components/responses/DaemonCommandUnavailable"
  /api/manual/{program_id}:
    parameters:
      - $ref: "#/components/parameters/ProgramIdPath"
    patch:
      tags:
        - App
      summary: Update a manual program
      operationId: updateManualProgram
      requestBody:
        $ref: "#/components/requestBodies/ManualProgramPatchBody"
      responses:
        "200":
          $ref: "#/components/responses/WriteUpdated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/BodyTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          $ref: "#/components/responses/WriteFailed"
  /api/manual/execute:
    post:
      tags:
        - App
      summary: Queue a manual watering program
      description: |
        App-facing alias for `/commands/exec`. Sends `EXEC <program_id>` to
        the daemon and only confirms that the command was forwarded.
      operationId: appExecuteManualProgram
      requestBody:
        $ref: "#/components/requestBodies/ProgramIdBody"
      responses:
        "202":
          description: Command accepted by the gateway and forwarded to the socket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAcceptedResponse"
              example:
                accepted: true
                command: EXEC 3
                ok: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/BodyTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "503":
          $ref: "#/components/responses/DaemonCommandUnavailable"
  /api/zones/test:
    post:
      tags:
        - App
      summary: Queue a zone relay test
      description: |
        App-facing alias for `/commands/test`. Sends `TEST <zone_id>` to the
        daemon. The daemon runs the selected zone for its configured short test
        duration.
      operationId: appTestZones
      requestBody:
        $ref: "#/components/requestBodies/ZoneIdBody"
      responses:
        "202":
          description: Command accepted by the gateway and forwarded to the socket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAcceptedResponse"
              example:
                ok: true
                accepted: true
                command: TEST 4
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/BodyTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "503":
          $ref: "#/components/responses/DaemonCommandUnavailable"
  /commands/stop:
    post:
      tags:
        - Commands
      summary: Request stop of the current watering job
      description: |
        Sends `STOP` to the daemon. The request body must be empty or `{}`.
      operationId: stopWatering
      requestBody:
        $ref: "#/components/requestBodies/EmptyJsonBody"
      responses:
        "202":
          description: Command accepted by the gateway and forwarded to the socket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAcceptedResponse"
              example:
                accepted: true
                command: STOP
                ok: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/BodyTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "503":
          $ref: "#/components/responses/DaemonCommandUnavailable"
  /api/stop:
    post:
      tags:
        - App
      summary: Request stop of the current watering job
      description: |
        App-facing alias for `/commands/stop`. Sends `STOP` to the daemon. The
        request body must be empty or `{}`.
      operationId: appStopWatering
      requestBody:
        $ref: "#/components/requestBodies/EmptyJsonBody"
      responses:
        "202":
          description: Command accepted by the gateway and forwarded to the socket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAcceptedResponse"
              example:
                accepted: true
                command: STOP
                ok: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/BodyTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "503":
          $ref: "#/components/responses/DaemonCommandUnavailable"
  /reload-schedules:
    post:
      tags:
        - Commands
      summary: Regenerate systemd schedule timers
      description: |
        Sends `RELOAD_SCHEDULES` to the daemon. The request body must be empty
        or `{}`.
      operationId: reloadSchedules
      requestBody:
        $ref: "#/components/requestBodies/EmptyJsonBody"
      responses:
        "202":
          description: Command accepted by the gateway and forwarded to the socket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAcceptedResponse"
              example:
                accepted: true
                command: RELOAD_SCHEDULES
                ok: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/BodyTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "503":
          $ref: "#/components/responses/DaemonCommandUnavailable"
  /api/reload-schedules:
    post:
      tags:
        - App
      summary: Regenerate systemd schedule timers
      description: |
        App-facing alias for `/reload-schedules`. Sends `RELOAD_SCHEDULES` to
        the daemon. The request body must be empty or `{}`.
      operationId: appReloadSchedules
      requestBody:
        $ref: "#/components/requestBodies/EmptyJsonBody"
      responses:
        "202":
          description: Command accepted by the gateway and forwarded to the socket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAcceptedResponse"
              example:
                accepted: true
                command: RELOAD_SCHEDULES
                ok: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/BodyTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "503":
          $ref: "#/components/responses/DaemonCommandUnavailable"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "Preferred form. Send `Authorization: Bearer <token>`."
    irigatieToken:
      type: apiKey
      in: header
      name: X-Irigatie-Token
      description: Alternate token header supported by the gateway.
  parameters:
    ZoneIdPath:
      name: zone_id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ScheduleIdPath:
      name: schedule_id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ProgramIdPath:
      name: program_id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
  requestBodies:
    ProgramIdBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProgramIdRequest"
          example:
            program_id: 12
    ZoneIdBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ZoneIdRequest"
          example:
            zone_id: 4
    ZonePatchBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ZonePatchRequest"
          example:
            name: Gradina fata
            type: drip
            enabled: false
    ZoneEnabledBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ZoneEnabledRequest"
          example:
            enabled: true
    ScheduleWriteBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ScheduleWriteRequest"
          example:
            zone_id: 1
            month: "*"
            day_of_month: "*"
            day_of_week: "*"
            hour: "6"
            minute: "30"
            duration_minutes: 15
            max_rain_mm: 2.5
            enabled: true
    SchedulePatchBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SchedulePatchRequest"
          example:
            day_of_week: "1,3,5"
            duration_minutes: 20
            enabled: true
    ManualProgramPatchBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ManualProgramPatchRequest"
          example:
            name: Program seara
            zone_durations:
              "1": 5
              "2": 10
              "3": 0
    EmptyJsonBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
          example: {}
  responses:
    WriteCreated:
      description: Resource created.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WriteSuccessResponse"
          example:
            ok: true
            id: 12
            message: created
    WriteUpdated:
      description: Resource updated.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WriteSuccessResponse"
          example:
            ok: true
            id: 12
            message: updated
    WriteDeleted:
      description: Resource deleted.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WriteSuccessResponse"
          example:
            ok: true
            id: 12
            message: deleted
    BadRequest:
      description: Invalid request body or command parameters.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid gateway token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: unauthorized
            ok: false
    NotFound:
      description: Requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            error: not_found
            message: Resource not found
    Conflict:
      description: Resource cannot be changed because it is still referenced.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            error: conflict
            message: Resource is still in use
    WriteFailed:
      description: Unexpected write failure.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            error: write_error
            message: Database write failed
    ReadFailed:
      description: Unexpected database read failure.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            error: read_error
            message: Database read failed
    BodyTooLarge:
      description: Request body exceeds the 4096 byte gateway limit.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: request body too large
            ok: false
    UnsupportedMediaType:
      description: Non-empty request body was not sent as JSON.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: Content-Type must be application/json
            ok: false
    DaemonCommandUnavailable:
      description: Gateway could not forward the command to the daemon socket.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DaemonCommandErrorResponse"
  schemas:
    ProgramIdRequest:
      type: object
      additionalProperties: false
      required:
        - program_id
      properties:
        program_id:
          type: integer
          minimum: 1
          description: Scheduled or manual program id, depending on endpoint.
    ZoneIdRequest:
      type: object
      additionalProperties: false
      required:
        - zone_id
      properties:
        zone_id:
          type: integer
          minimum: 1
          description: Zone id to run through the daemon `TEST <zone_id>` command.
    WriteSuccessResponse:
      type: object
      additionalProperties: false
      required:
        - ok
        - id
        - message
      properties:
        ok:
          type: boolean
          enum:
            - true
        id:
          type: integer
        message:
          type: string
          enum:
            - created
            - updated
            - deleted
    ZonePatchRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 32
        type:
          $ref: "#/components/schemas/ZoneType"
        enabled:
          type: boolean
    ZoneEnabledRequest:
      type: object
      additionalProperties: false
      required:
        - enabled
      properties:
        enabled:
          type: boolean
    ZoneType:
      type: string
      enum:
        - sprinkler
        - drip
    ScheduleWriteRequest:
      type: object
      additionalProperties: false
      required:
        - zone_id
        - month
        - day_of_month
        - day_of_week
        - hour
        - minute
        - duration_minutes
        - max_rain_mm
        - enabled
      properties:
        zone_id:
          type: integer
          minimum: 1
        month:
          type: string
          minLength: 1
          maxLength: 10
        day_of_month:
          type: string
          minLength: 1
          maxLength: 10
        day_of_week:
          type: string
          minLength: 1
          maxLength: 10
        hour:
          type: string
          minLength: 1
          maxLength: 10
        minute:
          type: string
          minLength: 1
          maxLength: 10
        duration_minutes:
          type: integer
          minimum: 1
          maximum: 120
        max_rain_mm:
          type: number
          minimum: 0
        enabled:
          type: boolean
    SchedulePatchRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        zone_id:
          type: integer
          minimum: 1
        month:
          type: string
          minLength: 1
          maxLength: 10
        day_of_month:
          type: string
          minLength: 1
          maxLength: 10
        day_of_week:
          type: string
          minLength: 1
          maxLength: 10
        hour:
          type: string
          minLength: 1
          maxLength: 10
        minute:
          type: string
          minLength: 1
          maxLength: 10
        duration_minutes:
          type: integer
          minimum: 1
          maximum: 120
        max_rain_mm:
          type: number
          minimum: 0
        enabled:
          type: boolean
    ManualProgramPatchRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 32
        zone_durations:
          $ref: "#/components/schemas/ManualZoneDurations"
    ManualZoneDurations:
      type: object
      description: Manual watering duration in minutes, keyed by zone id as a string.
      additionalProperties:
        type: integer
        minimum: 0
        maximum: 120
    CommandAcceptedResponse:
      type: object
      additionalProperties: false
      required:
        - ok
        - accepted
        - command
      properties:
        ok:
          type: boolean
          enum:
            - true
        accepted:
          type: boolean
          enum:
            - true
        command:
          type: string
          description: Exact daemon socket command forwarded by the gateway.
          example: START 12
    ErrorResponse:
      type: object
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          enum:
            - false
        error:
          type: string
        detail:
          type: string
          nullable: true
      additionalProperties: true
    DaemonCommandErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            error:
              type: string
              enum:
                - irrigation socket does not exist
                - failed to send command to irrigation socket
    StatusResponse:
      type: object
      additionalProperties: false
      required:
        - ok
        - gateway
        - daemon
      properties:
        ok:
          type: boolean
          description: Mirrors `daemon.ok`.
        gateway:
          $ref: "#/components/schemas/GatewayStatus"
        daemon:
          oneOf:
            - $ref: "#/components/schemas/DaemonStatus"
            - $ref: "#/components/schemas/DaemonStatusError"
    StatusUnavailableResponse:
      type: object
      additionalProperties: false
      required:
        - ok
        - gateway
        - daemon
      properties:
        ok:
          type: boolean
          enum:
            - false
        gateway:
          $ref: "#/components/schemas/GatewayStatus"
        daemon:
          type: object
          additionalProperties: true
          required:
            - ok
            - error
          properties:
            ok:
              type: boolean
              enum:
                - false
            error:
              type: string
              example: failed to query irrigation daemon
            detail:
              type: string
    WateringHistoryResponse:
      type: object
      additionalProperties: false
      required:
        - ok
        - items
        - next_before_id
        - has_more
      properties:
        ok:
          type: boolean
          enum:
            - true
        items:
          type: array
          items:
            $ref: "#/components/schemas/WateringHistoryItem"
        next_before_id:
          type: integer
          nullable: true
          minimum: 1
          description: Last returned item id when another page may exist, otherwise null.
        has_more:
          type: boolean
    WateringHistoryItem:
      type: object
      additionalProperties: false
      required:
        - id
        - started_at
        - ended_at
        - source
        - program_id
        - program_name
        - zone_id
        - zone_name
        - planned_seconds
        - actual_seconds
        - rain_credit_mm
        - result
        - error
      properties:
        id:
          type: integer
          minimum: 1
        started_at:
          type: string
          description: Local database timestamp formatted as `YYYY-MM-DD HH:MM:SS`.
          example: "2026-07-09 06:00:02"
        ended_at:
          type: string
          description: Local database timestamp formatted as `YYYY-MM-DD HH:MM:SS`.
          example: "2026-07-09 06:11:58"
        source:
          type: string
          description: Raw `watering_log.source`.
          example: scheduled
        program_id:
          type: integer
          nullable: true
          minimum: 1
        program_name:
          type: string
          nullable: true
          example: "Program #12"
        zone_id:
          type: integer
          nullable: true
          minimum: 1
        zone_name:
          type: string
          nullable: true
          example: Gazon fata
        planned_seconds:
          type: number
          format: float
          nullable: true
        actual_seconds:
          type: number
          format: float
          nullable: true
        rain_credit_mm:
          type: number
          format: float
          nullable: true
        result:
          type: string
          description: Raw result code. Unknown future result strings are allowed.
          example: completed
        error:
          type: string
          nullable: true
    AppSnapshotResponse:
      type: object
      additionalProperties: false
      required:
        - ok
        - database
        - gateway
        - queue
        - runtime
        - last_rain
        - rain_24h
        - zones
        - schedules
        - manual_programs
      properties:
        ok:
          type: boolean
          description: True when the snapshot was built from database data; false when a degraded payload was returned.
        database:
          $ref: "#/components/schemas/AppDatabaseStatus"
        gateway:
          $ref: "#/components/schemas/AppGatewayStatus"
        queue:
          $ref: "#/components/schemas/AppQueueStatus"
        runtime:
          $ref: "#/components/schemas/AppRuntimeState"
        last_rain:
          oneOf:
            - $ref: "#/components/schemas/AppRainEvent"
            - $ref: "#/components/schemas/AppRainFallback"
        rain_24h:
          $ref: "#/components/schemas/AppRain24h"
        zones:
          type: array
          items:
            $ref: "#/components/schemas/AppZone"
        schedules:
          type: array
          items:
            $ref: "#/components/schemas/AppSchedule"
        manual_programs:
          type: array
          items:
            $ref: "#/components/schemas/AppManualProgram"
    AppDatabaseStatus:
      type: object
      additionalProperties: false
      required:
        - ok
        - name
      properties:
        ok:
          type: boolean
        name:
          type: string
        error:
          type: string
          nullable: true
          description: Present when the snapshot is degraded because database reads failed.
    AppGatewayStatus:
      type: object
      additionalProperties: false
      required:
        - online
        - socket_path
      properties:
        online:
          type: boolean
          description: Whether daemon status was available while building the snapshot.
        socket_path:
          type: string
          example: /run/irigatie/control.sock
    AppQueueStatus:
      type: object
      additionalProperties: false
      required:
        - pending
        - max
      properties:
        pending:
          type: integer
          minimum: 0
        max:
          type: integer
          minimum: 1
          example: 4
    AppRuntimeState:
      type: object
      additionalProperties: false
      required:
        - state
        - source
        - command
        - program_id
        - zone_id
        - remaining_seconds
        - heartbeat_at
        - message
      properties:
        state:
          type: string
          enum:
            - idle
            - running
            - stopping
            - interrupted
            - error
            - unknown
        source:
          type: string
          nullable: true
        command:
          type: string
          nullable: true
          enum:
            - START
            - EXEC
            - STOP
            - SHUTDOWN
            - RELOAD_SCHEDULES
            - TEST
            - null
        program_id:
          type: integer
          nullable: true
        zone_id:
          type: integer
          nullable: true
        remaining_seconds:
          type: integer
          nullable: true
          minimum: 0
        heartbeat_at:
          type: string
          nullable: true
          description: Local database timestamp formatted as `YYYY-MM-DD HH:MM:SS`.
          example: "2026-07-08 12:34:56"
        message:
          type: string
          nullable: true
    AppRainEvent:
      type: object
      additionalProperties: true
      required:
        - source
        - event_time
        - amount_mm
        - raw_value
      properties:
        source:
          type: string
          example: openmeteo
        event_time:
          type: string
          description: Local database timestamp formatted as `YYYY-MM-DD HH:MM:SS`.
          example: "2026-07-08 12:34:56"
        amount_mm:
          type: number
          format: float
        raw_value:
          type: string
          nullable: true
    AppRainFallback:
      type: object
      additionalProperties: false
      required:
        - source
        - event_time
        - amount_mm
      properties:
        source:
          type: string
          enum:
            - N/A
        event_time:
          type: string
          enum:
            - N/A
        amount_mm:
          type: number
          enum:
            - 0
        raw_value:
          type: string
          nullable: true
    AppRain24h:
      type: object
      additionalProperties: false
      required:
        - window_hours
        - window_start
        - window_end
        - sources
      properties:
        window_hours:
          type: integer
          enum:
            - 24
        window_start:
          type: string
          description: Local gateway timestamp formatted as `YYYY-MM-DD HH:MM:SS`.
          example: "2026-07-08 15:42:00"
        window_end:
          type: string
          description: Local gateway timestamp formatted as `YYYY-MM-DD HH:MM:SS`.
          example: "2026-07-09 15:42:00"
        sources:
          type: object
          additionalProperties: false
          required:
            - openmeteo
            - hardware
          properties:
            openmeteo:
              $ref: "#/components/schemas/AppRain24hSource"
            hardware:
              $ref: "#/components/schemas/AppRain24hSource"
    AppRain24hSource:
      type: object
      additionalProperties: false
      required:
        - amount_mm
        - event_count
        - latest_event_time
      properties:
        amount_mm:
          type: number
          format: float
          description: Sum of positive `rain_events.amount_mm` values for this source within the 24-hour window.
        event_count:
          type: integer
          minimum: 0
        latest_event_time:
          type: string
          nullable: true
          description: Latest included rain event timestamp formatted as `YYYY-MM-DD HH:MM:SS`, or null when no event was included.
          example: "2026-07-09 06:10:00"
    AppZone:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - type
        - enabled
        - relay_active
        - relay_value
      properties:
        id:
          type: integer
        name:
          type: string
          nullable: true
        type:
          $ref: "#/components/schemas/ZoneType"
        enabled:
          type: boolean
        relay_active:
          type: boolean
        relay_value:
          type: number
          nullable: true
    AppSchedule:
      type: object
      additionalProperties: false
      required:
        - id
        - zone_id
        - month
        - day_of_month
        - day_of_week
        - hour
        - minute
        - duration_minutes
        - max_rain_mm
        - current_rain_mm
        - enabled
      properties:
        id:
          type: integer
        zone_id:
          type: integer
          nullable: true
        month:
          type: string
          nullable: true
          example: "*"
        day_of_month:
          type: string
          nullable: true
          example: "*"
        day_of_week:
          type: string
          nullable: true
          example: "*"
        hour:
          type: string
          nullable: true
          example: "6"
        minute:
          type: string
          nullable: true
          example: "0"
        duration_minutes:
          type: integer
          nullable: true
        max_rain_mm:
          type: number
          nullable: true
        current_rain_mm:
          type: number
          nullable: true
        enabled:
          type: boolean
    AppManualProgram:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - zone_durations
      properties:
        id:
          type: integer
        name:
          type: string
        zone_durations:
          type: object
          description: Manual watering duration in minutes, keyed by zone id as a string.
          additionalProperties:
            type: integer
            minimum: 0
    GatewayStatus:
      type: object
      additionalProperties: false
      required:
        - state
        - socket_path
        - socket_exists
        - daemon_status_supported
      properties:
        state:
          type: string
          enum:
            - running
        socket_path:
          type: string
          example: /run/irigatie/control.sock
        socket_exists:
          type: boolean
        daemon_status_supported:
          type: boolean
          enum:
            - true
    DaemonStatus:
      type: object
      additionalProperties: false
      required:
        - ok
        - daemon_state
        - current_program
        - current_zone
        - remaining_seconds
        - last_rain_update
        - db
        - relay_state
        - runtime
        - queue
        - schedule_reload
        - checks
      properties:
        ok:
          type: boolean
        daemon_state:
          type: string
          description: Runtime state from the daemon database row, or `unknown`.
          enum:
            - idle
            - running
            - stopping
            - interrupted
            - error
            - unknown
        current_program:
          type: integer
          nullable: true
        current_zone:
          type: integer
          nullable: true
        remaining_seconds:
          type: integer
          nullable: true
          minimum: 0
          description: "`0` when idle; `null` when running without an expected end time."
        last_rain_update:
          type: object
          allOf:
            - $ref: "#/components/schemas/RainEvent"
          nullable: true
        db:
          $ref: "#/components/schemas/DatabaseStatus"
        relay_state:
          $ref: "#/components/schemas/RelayState"
        runtime:
          type: object
          allOf:
            - $ref: "#/components/schemas/RuntimeState"
          nullable: true
        queue:
          $ref: "#/components/schemas/QueueStatus"
        schedule_reload:
          $ref: "#/components/schemas/ScheduleReloadStatus"
        checks:
          $ref: "#/components/schemas/DaemonChecks"
    DaemonStatusError:
      type: object
      additionalProperties: true
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          enum:
            - false
        error:
          type: string
          example: failed to build status
        detail:
          type: string
          nullable: true
    DatabaseStatus:
      type: object
      additionalProperties: false
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
        error:
          type: string
          nullable: true
    RelayState:
      type: object
      additionalProperties: false
      required:
        - transformer
        - zones
      properties:
        transformer:
          $ref: "#/components/schemas/SingleRelayState"
        zones:
          type: object
          description: Relay state keyed by zone id as a string.
          additionalProperties:
            $ref: "#/components/schemas/SingleRelayState"
          example:
            "1":
              active: false
              value: 0
            "2":
              active: false
              value: 0
    SingleRelayState:
      type: object
      additionalProperties: false
      required:
        - active
        - value
      properties:
        active:
          type: boolean
          nullable: true
        value:
          type: number
          nullable: true
    QueueStatus:
      type: object
      additionalProperties: false
      required:
        - pending_watering_commands
        - max_pending_watering_commands
      properties:
        pending_watering_commands:
          type: integer
          minimum: 0
        max_pending_watering_commands:
          type: integer
          minimum: 1
          example: 4
    ScheduleReloadStatus:
      type: object
      additionalProperties: false
      required:
        - state
        - last_started_at
        - last_finished_at
        - error
      properties:
        state:
          type: string
          enum:
            - unknown
            - running
            - ok
            - error
        last_started_at:
          type: string
          format: date-time
          nullable: true
        last_finished_at:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true
    DaemonChecks:
      type: object
      additionalProperties: false
      required:
        - daemon_ok
        - db_ok
        - socket_ok
        - relay_safety_ok
        - queue_ok
      properties:
        daemon_ok:
          type: boolean
        db_ok:
          type: boolean
        socket_ok:
          type: boolean
        relay_safety_ok:
          type: boolean
          description: False when an irrigation zone relay appears active while the daemon is not running or stopping.
        queue_ok:
          type: boolean
    RuntimeState:
      type: object
      additionalProperties: true
      required:
        - id
        - state
        - source
        - command
        - program_id
        - traseu_id
        - started_at
        - expected_end_at
        - heartbeat_at
        - updated_at
        - message
      properties:
        id:
          type: integer
        state:
          type: string
          enum:
            - idle
            - running
            - stopping
            - interrupted
            - error
        source:
          type: string
          nullable: true
          example: scheduled
        command:
          type: string
          nullable: true
          enum:
            - START
            - EXEC
            - STOP
            - SHUTDOWN
            - RELOAD_SCHEDULES
            - TEST
            - null
        program_id:
          type: integer
          nullable: true
        traseu_id:
          type: integer
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        expected_end_at:
          type: string
          format: date-time
          nullable: true
        heartbeat_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        message:
          type: string
          nullable: true
    RainEvent:
      type: object
      additionalProperties: true
      required:
        - id
        - source
        - event_time
        - amount_mm
        - raw_value
        - created_at
      properties:
        id:
          type: integer
        source:
          type: string
          example: hardware
        event_time:
          type: string
          format: date-time
        amount_mm:
          type: number
          format: float
        raw_value:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
