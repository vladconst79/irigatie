openapi: 3.0.3
info:
  title: Irigatie HTTP Gateway API
  version: 1.0.0
  description: |
    HTTP API exposed by `irigatie-http-gateway.py`.

    The gateway authenticates requests, validates JSON bodies, and forwards
    accepted commands to the local irrigation daemon Unix socket. The daemon
    owns GPIO control; API clients must not talk to GPIO, MySQL, systemd, or
    the Unix socket directly.
servers:
  - url: http://raspberry-pi-host-or-ip:8080
    description: Raspberry Pi HTTP gateway
security:
  - bearerAuth: []
  - irigatieToken: []
tags:
  - name: Status
  - name: Commands
  - name: App
paths:
  /status:
    get:
      tags:
        - Status
      summary: Read gateway and daemon status
      operationId: getStatus
      responses:
        "200":
          description: Gateway and daemon status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Gateway is running but the daemon status could not be read.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusUnavailableResponse"
  /api/snapshot:
    get:
      tags:
        - App
      summary: Read app snapshot
      description: |
        Returns the app read model assembled from the database plus best-effort
        daemon status. If the daemon status socket is unavailable, database
        data can still be returned with `gateway.online: false`.
      operationId: getAppSnapshot
      responses:
        "200":
          description: Snapshot for app/mobile clients. Can be degraded when database reads fail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSnapshotResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /commands/start:
    post:
      tags:
        - Commands
      summary: Queue a scheduled watering program
      description: |
        Sends `START <program_id>` to the daemon. The HTTP gateway only confirms
        that the command was forwarded to the socket.
      operationId: startProgram
      requestBody:
        $ref: "#/components/requestBodies/ProgramIdBody"
      responses:
        "202":
          description: Command accepted by the gateway and forwarded to the socket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAcceptedResponse"
              example:
                accepted: true
                command: START 12
                ok: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/BodyTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "503":
          $ref: "#/components/responses/DaemonCommandUnavailable"
  /api/schedules/start:
    post:
      tags:
        - App
      summary: Queue a scheduled watering program
      description: |
        App-facing alias for `/commands/start`. Sends `START <program_id>` to
        the daemon and only confirms that the command was forwarded.
      operationId: appStartSchedule
      requestBody:
        $ref: "#/components/requestBodies/ProgramIdBody"
      responses:
        "202":
          description: Command accepted by the gateway and forwarded to the socket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAcceptedResponse"
              example:
                accepted: true
                command: START 12
                ok: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/BodyTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "503":
          $ref: "#/components/responses/DaemonCommandUnavailable"
  /commands/exec:
    post:
      tags:
        - Commands
      summary: Queue a manual watering program
      description: |
        Sends `EXEC <program_id>` to the daemon. The HTTP gateway only confirms
        that the command was forwarded to the socket.
      operationId: executeManualProgram
      requestBody:
        $ref: "#/components/requestBodies/ProgramIdBody"
      responses:
        "202":
          description: Command accepted by the gateway and forwarded to the socket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAcceptedResponse"
              example:
                accepted: true
                command: EXEC 3
                ok: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/BodyTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "503":
          $ref: "#/components/responses/DaemonCommandUnavailable"
  /api/manual/execute:
    post:
      tags:
        - App
      summary: Queue a manual watering program
      description: |
        App-facing alias for `/commands/exec`. Sends `EXEC <program_id>` to
        the daemon and only confirms that the command was forwarded.
      operationId: appExecuteManualProgram
      requestBody:
        $ref: "#/components/requestBodies/ProgramIdBody"
      responses:
        "202":
          description: Command accepted by the gateway and forwarded to the socket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAcceptedResponse"
              example:
                accepted: true
                command: EXEC 3
                ok: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/BodyTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "503":
          $ref: "#/components/responses/DaemonCommandUnavailable"
  /commands/stop:
    post:
      tags:
        - Commands
      summary: Request stop of the current watering job
      description: |
        Sends `STOP` to the daemon. The request body must be empty or `{}`.
      operationId: stopWatering
      requestBody:
        $ref: "#/components/requestBodies/EmptyJsonBody"
      responses:
        "202":
          description: Command accepted by the gateway and forwarded to the socket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAcceptedResponse"
              example:
                accepted: true
                command: STOP
                ok: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/BodyTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "503":
          $ref: "#/components/responses/DaemonCommandUnavailable"
  /reload-schedules:
    post:
      tags:
        - Commands
      summary: Regenerate systemd schedule timers
      description: |
        Sends `RELOAD_SCHEDULES` to the daemon. The request body must be empty
        or `{}`.
      operationId: reloadSchedules
      requestBody:
        $ref: "#/components/requestBodies/EmptyJsonBody"
      responses:
        "202":
          description: Command accepted by the gateway and forwarded to the socket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAcceptedResponse"
              example:
                accepted: true
                command: RELOAD_SCHEDULES
                ok: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/BodyTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "503":
          $ref: "#/components/responses/DaemonCommandUnavailable"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "Preferred form. Send `Authorization: Bearer <token>`."
    irigatieToken:
      type: apiKey
      in: header
      name: X-Irigatie-Token
      description: Alternate token header supported by the gateway.
  requestBodies:
    ProgramIdBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProgramIdRequest"
          example:
            program_id: 12
    EmptyJsonBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
          example: {}
  responses:
    BadRequest:
      description: Invalid request body or command parameters.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid gateway token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: unauthorized
            ok: false
    BodyTooLarge:
      description: Request body exceeds the 4096 byte gateway limit.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: request body too large
            ok: false
    UnsupportedMediaType:
      description: Non-empty request body was not sent as JSON.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: Content-Type must be application/json
            ok: false
    DaemonCommandUnavailable:
      description: Gateway could not forward the command to the daemon socket.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DaemonCommandErrorResponse"
  schemas:
    ProgramIdRequest:
      type: object
      additionalProperties: false
      required:
        - program_id
      properties:
        program_id:
          type: integer
          minimum: 1
          description: Scheduled or manual program id, depending on endpoint.
    CommandAcceptedResponse:
      type: object
      additionalProperties: false
      required:
        - ok
        - accepted
        - command
      properties:
        ok:
          type: boolean
          enum:
            - true
        accepted:
          type: boolean
          enum:
            - true
        command:
          type: string
          description: Exact daemon socket command forwarded by the gateway.
          examples:
            - START 12
            - EXEC 3
            - STOP
            - RELOAD_SCHEDULES
    ErrorResponse:
      type: object
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          enum:
            - false
        error:
          type: string
        detail:
          type: string
          nullable: true
      additionalProperties: true
    DaemonCommandErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            error:
              type: string
              enum:
                - irrigation socket does not exist
                - failed to send command to irrigation socket
    StatusResponse:
      type: object
      additionalProperties: false
      required:
        - ok
        - gateway
        - daemon
      properties:
        ok:
          type: boolean
          description: Mirrors `daemon.ok`.
        gateway:
          $ref: "#/components/schemas/GatewayStatus"
        daemon:
          oneOf:
            - $ref: "#/components/schemas/DaemonStatus"
            - $ref: "#/components/schemas/DaemonStatusError"
    StatusUnavailableResponse:
      type: object
      additionalProperties: false
      required:
        - ok
        - gateway
        - daemon
      properties:
        ok:
          type: boolean
          enum:
            - false
        gateway:
          $ref: "#/components/schemas/GatewayStatus"
        daemon:
          type: object
          additionalProperties: true
          required:
            - ok
            - error
          properties:
            ok:
              type: boolean
              enum:
                - false
            error:
              type: string
              examples:
                - failed to query irrigation daemon
                - invalid status response from irrigation daemon
            detail:
              type: string
    AppSnapshotResponse:
      type: object
      additionalProperties: false
      required:
        - ok
        - database
        - gateway
        - queue
        - runtime
        - last_rain
        - zones
        - schedules
        - manual_programs
      properties:
        ok:
          type: boolean
          description: True when the snapshot was built from database data; false when a degraded payload was returned.
        database:
          $ref: "#/components/schemas/AppDatabaseStatus"
        gateway:
          $ref: "#/components/schemas/AppGatewayStatus"
        queue:
          $ref: "#/components/schemas/AppQueueStatus"
        runtime:
          $ref: "#/components/schemas/AppRuntimeState"
        last_rain:
          oneOf:
            - $ref: "#/components/schemas/AppRainEvent"
            - $ref: "#/components/schemas/AppRainFallback"
        zones:
          type: array
          items:
            $ref: "#/components/schemas/AppZone"
        schedules:
          type: array
          items:
            $ref: "#/components/schemas/AppSchedule"
        manual_programs:
          type: array
          items:
            $ref: "#/components/schemas/AppManualProgram"
    AppDatabaseStatus:
      type: object
      additionalProperties: false
      required:
        - ok
        - name
      properties:
        ok:
          type: boolean
        name:
          type: string
        error:
          type: string
          nullable: true
          description: Present when the snapshot is degraded because database reads failed.
    AppGatewayStatus:
      type: object
      additionalProperties: false
      required:
        - online
        - socket_path
      properties:
        online:
          type: boolean
          description: Whether daemon status was available while building the snapshot.
        socket_path:
          type: string
          example: /run/irigatie/control.sock
    AppQueueStatus:
      type: object
      additionalProperties: false
      required:
        - pending
        - max
      properties:
        pending:
          type: integer
          minimum: 0
        max:
          type: integer
          minimum: 1
          example: 4
    AppRuntimeState:
      type: object
      additionalProperties: false
      required:
        - state
        - source
        - command
        - program_id
        - zone_id
        - remaining_seconds
        - heartbeat_at
        - message
      properties:
        state:
          type: string
          enum:
            - idle
            - running
            - stopping
            - interrupted
            - error
            - unknown
        source:
          type: string
          nullable: true
        command:
          type: string
          nullable: true
          enum:
            - START
            - EXEC
            - STOP
            - SHUTDOWN
            - RELOAD_SCHEDULES
            - null
        program_id:
          type: integer
          nullable: true
        zone_id:
          type: integer
          nullable: true
        remaining_seconds:
          type: integer
          nullable: true
          minimum: 0
        heartbeat_at:
          type: string
          nullable: true
          description: Local database timestamp formatted as `YYYY-MM-DD HH:MM:SS`.
          example: "2026-07-08 12:34:56"
        message:
          type: string
          nullable: true
    AppRainEvent:
      type: object
      additionalProperties: true
      required:
        - source
        - event_time
        - amount_mm
        - raw_value
      properties:
        source:
          type: string
          examples:
            - hardware
            - openmeteo
            - manual
        event_time:
          type: string
          description: Local database timestamp formatted as `YYYY-MM-DD HH:MM:SS`.
          example: "2026-07-08 12:34:56"
        amount_mm:
          type: number
          format: float
        raw_value:
          type: string
          nullable: true
    AppRainFallback:
      type: object
      additionalProperties: false
      required:
        - source
        - event_time
        - amount_mm
      properties:
        source:
          type: string
          enum:
            - N/A
        event_time:
          type: string
          enum:
            - N/A
        amount_mm:
          type: number
          enum:
            - 0
        raw_value:
          nullable: true
    AppZone:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - type
        - enabled
        - relay_active
        - relay_value
      properties:
        id:
          type: integer
        name:
          type: string
          nullable: true
        type:
          type: integer
          nullable: true
        enabled:
          description: Zone enabled flag from MySQL; usually emitted as `0` or `1`.
          oneOf:
            - type: boolean
            - type: integer
              enum:
                - 0
                - 1
        relay_active:
          type: boolean
        relay_value:
          type: number
          nullable: true
    AppSchedule:
      type: object
      additionalProperties: false
      required:
        - id
        - zone_id
        - month
        - day_of_month
        - day_of_week
        - hour
        - minute
        - duration_minutes
        - max_rain_mm
        - current_rain_mm
      properties:
        id:
          type: integer
        zone_id:
          type: integer
          nullable: true
        month:
          type: string
          nullable: true
          example: "*"
        day_of_month:
          type: string
          nullable: true
          example: "*"
        day_of_week:
          type: string
          nullable: true
          example: "*"
        hour:
          type: string
          nullable: true
          example: "6"
        minute:
          type: string
          nullable: true
          example: "0"
        duration_minutes:
          type: integer
          nullable: true
        max_rain_mm:
          type: number
          nullable: true
        current_rain_mm:
          type: number
          nullable: true
    AppManualProgram:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - zone_durations
      properties:
        id:
          type: integer
        name:
          type: string
        zone_durations:
          type: object
          description: Manual watering duration in minutes, keyed by zone id as a string.
          additionalProperties:
            type: integer
            minimum: 0
    GatewayStatus:
      type: object
      additionalProperties: false
      required:
        - state
        - socket_path
        - socket_exists
        - daemon_status_supported
      properties:
        state:
          type: string
          enum:
            - running
        socket_path:
          type: string
          example: /run/irigatie/control.sock
        socket_exists:
          type: boolean
        daemon_status_supported:
          type: boolean
          enum:
            - true
    DaemonStatus:
      type: object
      additionalProperties: false
      required:
        - ok
        - daemon_state
        - current_program
        - current_zone
        - remaining_seconds
        - last_rain_update
        - db
        - relay_state
        - runtime
        - queue
      properties:
        ok:
          type: boolean
        daemon_state:
          type: string
          description: Runtime state from the daemon database row, or `unknown`.
          enum:
            - idle
            - running
            - stopping
            - interrupted
            - error
            - unknown
        current_program:
          type: integer
          nullable: true
        current_zone:
          type: integer
          nullable: true
        remaining_seconds:
          type: integer
          nullable: true
          minimum: 0
          description: "`0` when idle; `null` when running without an expected end time."
        last_rain_update:
          allOf:
            - $ref: "#/components/schemas/RainEvent"
          nullable: true
        db:
          $ref: "#/components/schemas/DatabaseStatus"
        relay_state:
          $ref: "#/components/schemas/RelayState"
        runtime:
          allOf:
            - $ref: "#/components/schemas/RuntimeState"
          nullable: true
        queue:
          $ref: "#/components/schemas/QueueStatus"
    DaemonStatusError:
      type: object
      additionalProperties: true
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          enum:
            - false
        error:
          type: string
          examples:
            - STATUS not supported by daemon
            - failed to build status
        detail:
          type: string
          nullable: true
    DatabaseStatus:
      type: object
      additionalProperties: false
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
        error:
          type: string
          nullable: true
    RelayState:
      type: object
      additionalProperties: false
      required:
        - transformer
        - zones
      properties:
        transformer:
          $ref: "#/components/schemas/SingleRelayState"
        zones:
          type: object
          description: Relay state keyed by zone id as a string.
          additionalProperties:
            $ref: "#/components/schemas/SingleRelayState"
          example:
            "1":
              active: false
              value: 0
            "2":
              active: false
              value: 0
    SingleRelayState:
      type: object
      additionalProperties: false
      required:
        - active
        - value
      properties:
        active:
          type: boolean
          nullable: true
        value:
          type: number
          nullable: true
    QueueStatus:
      type: object
      additionalProperties: false
      required:
        - pending_watering_commands
        - max_pending_watering_commands
      properties:
        pending_watering_commands:
          type: integer
          minimum: 0
        max_pending_watering_commands:
          type: integer
          minimum: 1
          example: 4
    RuntimeState:
      type: object
      additionalProperties: true
      required:
        - id
        - state
        - source
        - command
        - program_id
        - traseu_id
        - started_at
        - expected_end_at
        - heartbeat_at
        - updated_at
        - message
      properties:
        id:
          type: integer
        state:
          type: string
          enum:
            - idle
            - running
            - stopping
            - interrupted
            - error
        source:
          type: string
          nullable: true
          examples:
            - manual
            - scheduled
            - socket
            - button
        command:
          type: string
          nullable: true
          enum:
            - START
            - EXEC
            - STOP
            - SHUTDOWN
            - RELOAD_SCHEDULES
            - null
        program_id:
          type: integer
          nullable: true
        traseu_id:
          type: integer
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        expected_end_at:
          type: string
          format: date-time
          nullable: true
        heartbeat_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        message:
          type: string
          nullable: true
    RainEvent:
      type: object
      additionalProperties: true
      required:
        - id
        - source
        - event_time
        - amount_mm
        - raw_value
        - created_at
      properties:
        id:
          type: integer
        source:
          type: string
          examples:
            - hardware
            - openmeteo
            - manual
        event_time:
          type: string
          format: date-time
        amount_mm:
          type: number
          format: float
        raw_value:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
