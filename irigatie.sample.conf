[ConectGPIO]
#### Config GPIO ###
R_TRAF = 26
R_IRI1 = 21
R_IRI2 = 20
R_IRI3 = 16
R_IRI4 = 12
S_RAIN = 23
L_RED = 18
L_GREEN = 19
L_BLUE = 13
B_BUT1 = 9
B_BUT2 = 11
B_BUT3 = 22
B_BUT4 = 10

[Hardware Control]
P_TRAF = Auto
RAIN_ON = 1
GPIO_BACKEND = real

[Safety]
MAX_ZONE_SECONDS = 3600
MAX_PROGRAM_SECONDS = 7200

[Rain]
SOURCE = openmeteo
HARDWARE_PULSE_MM = 0.2794
HYBRID_HARDWARE_FACTOR = 0.0
HYBRID_OPENMETEO_FACTOR = 1.0
HYBRID_MANUAL_FACTOR = 1.0

[HTTP Gateway]
BIND_HOST = 0.0.0.0
BIND_PORT = 8080
SOCKET_PATH = /run/irigatie/control.sock
AUTH_TOKEN = replace-with-a-long-random-token
DAEMON_STATUS_TIMEOUT_SECONDS = 15
TRUSTED_PROXIES = 127.0.0.1, ::1

[Control Socket]
SOCKET_PATH = /run/irigatie/control.sock
SOCKET_MODE = 0660
SOCKET_OWNER = root
SOCKET_GROUP = root

[SQL]
DB_SERVER = 127.0.0.1
DB_PORT = 3306
DB_USER = irigatie_user
DB_PASS = replace-with-database-password
DB_NAME = irigatie

[Deeebug]
Deeebug = 0

[Weather API]
LATITUDE = 00.000000
LONGITUDE = 00.000000
TIMEZONE = Europe/Bucharest
PAST_HOURS = 30
MIN_MM = 0.01
STATE_FILE = /home/pi/irigatie/online-rain-openmeteo.json

[Database Cleanup]
RAIN_EVENTS_RETENTION_DAYS = 730
WATERING_LOG_RETENTION_DAYS = 730
DELETE_BATCH_SIZE = 1000
DELETE_ZERO_OPENMETEO = true

[Notifications]
ENABLED = false
CHANNELS = smtp,callmebot
STATE_FILE = /home/pi/irigatie/notification-state.json
MIN_SECONDS_BETWEEN_ALERTS = 300
REPEAT_ACTIVE_ISSUE_AFTER_SECONDS = 21600
RAIN_IMPORT_STALE_HOURS = 6
ON_WATERING_FAILURE = true
ON_RAIN_IMPORT_STALE = true
ON_DAEMON_RESTART_DURING_WATERING = true

[SMTP Notifications]
HOST = smtp.example.com
PORT = 587
STARTTLS = true
USERNAME = user@example.com
PASSWORD = replace-with-smtp-password
FROM = irigatie@example.com
TO = user@example.com

[CallMeBot]
PHONE = +40700000000
